<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}训练分析系统{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230F766E'/%3E%3Cpath d='M7 20h5l3-10 4 14 3-7h3' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="{{ base }}/static/style.css">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="{{ base }}/" class="logo">AI训练教练团</a>
        <button class="nav-toggle" onclick="this.nextElementSibling.classList.toggle('open')" aria-label="菜单">&#9776;</button>
        <div class="nav-links">
            <a href="{{ base }}/" {% if request.url.path == '/' %}class="active"{% endif %}>今日决策台</a>
            <a href="{{ base }}/data-center" {% if request.url.path == '/data-center' %}class="active"{% endif %}>数据中心</a>
            <a href="{{ base }}/performance" {% if request.url.path == '/performance' %}class="active"{% endif %}>训练表现</a>
            <a href="{{ base }}/rehab" {% if request.url.path == '/rehab' %}class="active"{% endif %}>康复风险</a>
            <a href="{{ base }}/nutrition" {% if request.url.path == '/nutrition' %}class="active"{% endif %}>营养恢复</a>
            <a href="{{ base }}/evidence-model" {% if request.url.path == '/evidence-model' %}class="active"{% endif %}>证据与模型</a>
            <a href="{{ base }}/sessions" {% if '/sessions' in request.url.path %}class="active"{% endif %}>训练记录</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script>window.BASE_PATH = '{{ base }}';</script>
    {% block scripts %}{% endblock %}
</body>
</html>
