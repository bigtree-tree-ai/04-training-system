<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}训练分析系统{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230F766E'/%3E%3Cpath d='M7 20h5l3-10 4 14 3-7h3' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="{{ base }}/static/style.css">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="{{ base }}/" class="logo">AI训练教练团</a>
        <button class="nav-toggle" onclick="this.nextElementSibling.classList.toggle('open')" aria-label="菜单">&#9776;</button>
        <div class="nav-links">
            <a href="{{ base }}/" {% if request.url.path == '/' %}class="active"{% endif %}>今天</a>
            <a href="{{ base }}/dashboard" {% if request.url.path == '/dashboard' %}class="active"{% endif %}>仪表板</a>
            <a href="{{ base }}/sessions" {% if '/sessions' in request.url.path %}class="active"{% endif %}>训练记录</a>
            <a href="{{ base }}/weekly" {% if request.url.path == '/weekly' %}class="active"{% endif %}>周视图</a>
            <a href="{{ base }}/comparison" {% if request.url.path == '/comparison' %}class="active"{% endif %}>环比分析</a>
            <a href="{{ base }}/plan" {% if request.url.path == '/plan' %}class="active"{% endif %}>训练计划</a>
            <a href="{{ base }}/recovery" {% if request.url.path == '/recovery' %}class="active"{% endif %}>恢复状态</a>
            <a href="{{ base }}/coros" {% if request.url.path == '/coros' %}class="active"{% endif %}>COROS全景</a>
            <a href="{{ base }}/ai-insights" {% if request.url.path == '/ai-insights' %}class="active"{% endif %}>AI分析</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script>window.BASE_PATH = '{{ base }}';</script>
    {% block scripts %}{% endblock %}
</body>
</html>
